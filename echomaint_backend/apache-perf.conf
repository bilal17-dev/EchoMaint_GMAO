# ──────────────────────────────────────────────────────────────────────────
# Performances Apache — EchoMaint production
# À coller dans le VirtualHost HTTPS de echomaint.pomtechlabs.com
# Puis : sudo a2enmod headers deflate && sudo systemctl reload apache2
# ──────────────────────────────────────────────────────────────────────────

# Compression gzip pour tous les types texte (deflate déjà activé globalement,
# on ajoute application/json que la config globale ne couvre pas)
<IfModule mod_deflate.c>
  AddOutputFilterByType DEFLATE application/json
</IfModule>

# Cache navigateur longue durée pour les assets versionnés (Vite ajoute un hash)
<IfModule mod_headers.c>
  <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
    Header set Cache-Control "max-age=31536000, public, immutable"
  </FilesMatch>
  # HTML : pas de cache (toujours l'index.html le plus récent)
  <FilesMatch "\.html$">
    Header set Cache-Control "no-cache, no-store, must-revalidate"
  </FilesMatch>
</IfModule>

# SPA React : toutes les routes inconnues → index.html
<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteBase /
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule ^ index.html [L]
</IfModule>
